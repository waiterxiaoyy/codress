<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Codress Pet</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        -webkit-app-region: no-drag;
        user-select: none;
        cursor: grab;
      }
      body.dragging {
        cursor: grabbing;
      }
      .stage {
        height: 100%;
        display: grid;
        place-items: end center;
        padding-bottom: 8px;
        box-sizing: border-box;
      }
      canvas, img {
        max-width: 150px;
        max-height: 150px;
        image-rendering: pixelated;
        filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.25));
      }
      .name {
        position: fixed;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        background: #111;
        color: #fff;
        font: 11px/18px system-ui, sans-serif;
        padding: 0 8px;
        border-radius: 2px;
        opacity: 0;
        transition: opacity 0.2s;
        white-space: nowrap;
      }
      body:hover .name {
        opacity: 1;
      }
      /* 单图模式动画 */
      .anim-idle img {
        animation: breathe 3.2s ease-in-out infinite;
      }
      .anim-bounce img {
        animation: bounce 1.6s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
      }
      .anim-walk img {
        animation: walk 2.4s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        30% { transform: translateY(-16px); }
        50% { transform: translateY(0); }
        62% { transform: translateY(-6px); }
        72% { transform: translateY(0); }
      }
      @keyframes walk {
        0%, 100% { transform: translateX(-14px) scaleX(1); }
        49% { transform: translateX(14px) scaleX(1); }
        51% { transform: translateX(14px) scaleX(-1); }
        99% { transform: translateX(-14px) scaleX(-1); }
      }
      @media (prefers-reduced-motion: reduce) {
        canvas, img { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="stage" id="stage"></div>
    <div class="name" id="name"></div>
    <script>
      const params = new URLSearchParams(location.search);
      const imageSrc = params.get("image") || "";
      const petName = params.get("name") || "";
      const animation = params.get("animation") || "idle";

      let pointerStart = null;
      let dragged = false;
      let dragFrame = 0;
      let suppressOpenUntil = 0;
      const petBridge = window.codressPet;

      document.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        pointerStart = { x: event.screenX, y: event.screenY };
        dragged = false;
        document.body.classList.add("dragging");
        document.body.setPointerCapture?.(event.pointerId);
        petBridge?.startDrag();
        event.preventDefault();
      });
      document.addEventListener("pointermove", (event) => {
        if (!pointerStart || !(event.buttons & 1)) return;
        if (Math.hypot(event.screenX - pointerStart.x, event.screenY - pointerStart.y) >= 4) dragged = true;
        if (dragFrame) return;
        dragFrame = requestAnimationFrame(() => {
          dragFrame = 0;
          petBridge?.moveDrag();
        });
      });
      const finishDrag = () => {
        if (!pointerStart) return;
        if (dragged) suppressOpenUntil = performance.now() + 500;
        pointerStart = null;
        document.body.classList.remove("dragging");
        petBridge?.endDrag();
      };
      document.addEventListener("pointerup", finishDrag);
      document.addEventListener("pointercancel", finishDrag);
      document.addEventListener("dblclick", (event) => {
        if (event.button === 0 && !dragged && performance.now() >= suppressOpenUntil) {
          petBridge?.openMainWindow();
        }
      });

      document.getElementById("name").textContent = petName;

      const resolvedSrc = imageSrc.startsWith("http")
        ? imageSrc
        : "file:///" + imageSrc.replace(/\\/g, "/").replace(/^\/+/, "");

      const img = new Image();
      img.src = resolvedSrc;
      img.onload = function () {
        const CELL_W = 192;
        const CELL_H = 208;

        // 判断是否为 spritesheet (宽度 >= 1536 且高度 >= 1872)
        if (img.naturalWidth >= CELL_W * 8 && img.naturalHeight >= CELL_H * 9) {
          // Spritesheet 模式：用 canvas 播放动画
          startSpriteAnimation(img, CELL_W, CELL_H);
        } else {
          // 单图模式：直接显示
          const el = document.createElement("img");
          el.src = resolvedSrc;
          el.alt = "pet";
          el.id = "pet";
          document.getElementById("stage").appendChild(el);
          document.getElementById("stage").className = "stage anim-" + animation;
        }
      };
      img.onerror = function () {
        // 加载失败，显示名字
        document.getElementById("stage").textContent = petName || "🐾";
      };

      function startSpriteAnimation(spriteImg, cellW, cellH) {
        // Codex v2 动画行定义
        const ROWS = {
          idle: { row: 0, frames: 6, durations: [280, 110, 110, 140, 140, 320] },
          "running-right": { row: 1, frames: 8, durations: null },
          "running-left": { row: 2, frames: 8, durations: null },
          waving: { row: 3, frames: 4, durations: [140, 140, 140, 280] },
          jumping: { row: 4, frames: 5, durations: [140, 140, 140, 140, 280] },
          failed: { row: 5, frames: 8, durations: null },
          waiting: { row: 6, frames: 6, durations: null },
          running: { row: 7, frames: 6, durations: null },
          review: { row: 8, frames: 6, durations: null },
        };

        const scale = 0.72; // 缩放到适合桌面宠物大小
        const canvas = document.createElement("canvas");
        canvas.width = cellW * scale;
        canvas.height = cellH * scale;
        canvas.style.imageRendering = "pixelated";
        document.getElementById("stage").appendChild(canvas);
        const ctx = canvas.getContext("2d");

        // 循环播放多个状态
        const stateOrder = ["idle", "idle", "idle", "waving", "idle", "idle", "running", "idle", "review", "idle"];
        let stateIdx = 0;
        let frame = 0;
        let loopCount = 0;
        let lastTick = 0;

        function getCurrentState() {
          const key = stateOrder[stateIdx % stateOrder.length];
          return ROWS[key] || ROWS.idle;
        }

        function getFrameDuration(state, f) {
          if (state.durations) return state.durations[f] || 140;
          return f === state.frames - 1 ? 220 : 120;
        }

        function tick(now) {
          const state = getCurrentState();
          const dur = getFrameDuration(state, frame);
          if (now - lastTick >= dur) {
            lastTick = now;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(
              spriteImg,
              frame * cellW, state.row * cellH, cellW, cellH,
              0, 0, cellW * scale, cellH * scale
            );
            frame++;
            if (frame >= state.frames) {
              frame = 0;
              loopCount++;
              // 每个状态播放 2-3 轮后切换
              if (loopCount >= (stateOrder[stateIdx % stateOrder.length] === "idle" ? 3 : 2)) {
                loopCount = 0;
                stateIdx++;
              }
            }
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }
    </script>
  </body>
</html>
