name: Release desktop app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify tag matches desktop version
        working-directory: platform/apps/desktop
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"

  build:
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
          - os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: platform
        run: pnpm install --frozen-lockfile
      - name: Verify macOS signing secrets
        if: matrix.target == 'mac'
        shell: bash
        run: |
          test -n "${CSC_LINK}"
          test -n "${CSC_KEY_PASSWORD}"
          test -n "${APPLE_ID}"
          test -n "${APPLE_APP_SPECIFIC_PASSWORD}"
          test -n "${APPLE_TEAM_ID}"
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build desktop
        working-directory: platform
        run: pnpm --filter @codress/desktop build
      - name: Package, sign, notarize and publish
        timeout-minutes: 45
        working-directory: platform
        run: pnpm --filter @codress/desktop exec electron-builder --${{ matrix.target }} --publish always
        env:
          DEBUG: electron-builder,electron-osx-sign*,electron-notarize*
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.target == 'mac' && secrets.MAC_CERTIFICATE || secrets.WIN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ matrix.target == 'mac' && secrets.MAC_CERTIFICATE_PASSWORD || secrets.WIN_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish complete GitHub release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
